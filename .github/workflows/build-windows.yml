# Windows x64 构建 / 发布。
#
# 运行时定位(项目纪律:Bun+Electrobun 默认,Node+Electron 兼容):
#   - 默认发布产物来自 electrobun;Electron 退为「手动覆盖」(仅 workflow_dispatch 选 runtime=electron/both)。
#   - electrobun build 只构建宿主平台(不跨编译),故 Windows 产物必须在 windows-latest 上构建。
#   - electrobun 路径用 bun:sqlite + zstdShim,不需要 better-sqlite3 的 MSVC ABI 重建;
#     仅 Electron 路径(electron-builder)需要 install-app-deps 重建原生模块。
#
# 触发 → 产物映射:
#   workflow_dispatch tier=spike                         → spike:electrobun 打包验证(不发布)
#   push tag v*                                          → 基础版:electrobun portable zip(解压即跑,无自更新)
#   release published                                    → 完整版:默认仅 electrobun(portable zip + 自解压 Setup + 自更新元数据)
#   workflow_dispatch tier∈{basic,full} runtime∈{electron,both} → electron 手动覆盖(nsis+zip+latest.yml)
#
# 分发件只走 GitHub Release 资产、逐文件上传;更新元数据(update.json / latest.yml / blockmap)一律
# 作为独立文件,绝不放进任何聚合压缩包(已删除旧的聚合 upload-artifact)。
name: build

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: '构建运行时(默认 electrobun;electron/both 为手动覆盖)'
        type: choice
        options: [electrobun, electron, both]
        default: electrobun
      tier:
        description: '层级:spike(验证)/ basic(基础版)/ full(完整版)'
        type: choice
        options: [spike, basic, full]
        default: spike
  push:
    tags:
      - 'v*'                    # 打 v* tag 时出基础版(electrobun 便携 zip)
  release:
    types: [published]          # 在 GitHub 发布 Release 时出完整版(默认仅 electrobun)

permissions:
  contents: write        # 发布到 GitHub Release(gh release / electron-builder)需写权限

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ spike:electrobun Windows 打包验证(不发布)============
  spike:
    name: spike-electrobun-win-x64
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'spike'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Pre-build scan worker
        run: bun run bun:build:worker
      - name: Electrobun build (stable channel)
        run: bunx electrobun build --env=stable
      - name: Assert artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la artifacts/ || { echo "NO artifacts/ dir"; exit 1; }
          shopt -s nullglob
          zips=(artifacts/stable-win-x64-*.zip)
          [ ${#zips[@]} -gt 0 ] || { echo "MISSING stable-win-x64-*.zip"; exit 1; }
          [ -f artifacts/stable-win-x64-update.json ] || { echo "MISSING stable-win-x64-update.json"; exit 1; }
          echo "OK zip(s): ${zips[*]}"
      - name: Upload spike artifact (self-check only)
        uses: actions/upload-artifact@v7
        with:
          name: spike-electrobun-win-x64
          path: artifacts/stable-win-x64-*.zip
          if-no-files-found: error

  # ============ 基础版:tag v* → electrobun 便携 zip(无自更新)============
  electrobun-basic:
    name: electrobun-basic-win-x64
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tier == 'basic' && inputs.runtime != 'electron')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Pre-build scan worker
        run: bun run bun:build:worker
      - name: Electrobun build (stable channel)
        run: bunx electrobun build --env=stable
      # 从 stable 全量包 tar.zst 还原真应用目录,打成 portable zip(解压即跑,非自解压 Setup)。
      - name: Pack portable zip
        run: bun run scripts/pack-portable.mjs
      # 基础版只上传 portable zip(无自更新);tag push 时 Release 可能尚不存在 → 幂等 create-or-upload。
      - name: Publish portable zip to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          zips=(artifacts/stable-win-x64-*-portable.zip)
          [ ${#zips[@]} -gt 0 ] || { echo "MISSING portable zip"; exit 1; }
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${zips[@]}" --clobber
          else
            gh release create "$TAG" "${zips[@]}" --title "$TAG" --notes "electrobun 便携版(Windows x64)。解压到任意位置,双击 bin\\launcher.exe 运行。"
          fi

  # ============ 完整版:release published → 默认仅 electrobun(zip + 自更新元数据)============
  electrobun-full:
    name: electrobun-full-win-x64
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tier == 'full' && inputs.runtime != 'electron')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Pre-build scan worker
        run: bun run bun:build:worker
      - name: Electrobun build (stable channel)
        run: bunx electrobun build --env=stable
      # 同基础版:从 tar.zst 打 portable zip。完整版 portable + Setup 并存(给用户两种方式)。
      - name: Pack portable zip
        run: bun run scripts/pack-portable.mjs
      # 完整版上传全部产物:portable zip(解压即跑)+ 自解压 Setup.zip + 全量 tar.zst + update.json
      # (+可能 patch)。portable 与 Setup 并存;更新元数据各为独立 Release 资产(绝不进聚合包)。
      - name: Publish full artifacts to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(artifacts/stable-win-x64-*)
          [ ${#files[@]} -gt 0 ] || { echo "MISSING artifacts"; exit 1; }
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" --title "$TAG" --notes "electrobun 完整版(Windows x64):portable zip(解压即跑)+ Setup.zip(自解压安装,含自更新)。"
          fi

  # ============ Electron 手动覆盖:仅 workflow_dispatch runtime∈{electron,both} ============
  # release published 不触发 electron(完整版默认仅 electrobun)。electron-builder 自带 GitHub publish,
  # 用 package.json version 建草稿 Release 并上传 nsis+zip+latest.yml+blockmap(各为独立文件)。
  electron-full:
    name: electron-full-win-x64
    if: github.event_name == 'workflow_dispatch' && inputs.tier != 'spike' && (inputs.runtime == 'electron' || inputs.runtime == 'both')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile
      # 仅 Electron 路径需要:按 Electron ABI 重建 better-sqlite3 / zstd-napi 等原生模块。
      - name: Rebuild native modules for Electron ABI
        run: npx electron-builder install-app-deps
      - name: Build renderer + main (electron-vite)
        run: bun run build:electron
      # CLI 覆盖加回 nsis(默认 config 仅 zip);--publish always 建草稿 Release 并上传。
      - name: Package (electron-builder, nsis + zip)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis zip --x64 --publish always
