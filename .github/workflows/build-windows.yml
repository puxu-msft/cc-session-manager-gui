# Windows x64 构建。当前矩阵刻意只含 windows-x64;其他平台保留可能性(见 matrix 注释),不直接生成。
#
# 为什么用 CI 而非 WSL 跨建:better-sqlite3 是 ABI 绑定的原生模块,必须在目标平台(Windows + Electron ABI)
# 本地用 MSVC 重建,无法从 Linux 跨编译。GitHub windows-latest 自带 VS 2022 + Python,electron-builder
# install-app-deps 会在 runner 上把它按 Electron 42 的 ABI 重建。zstd-napi 是 N-API,同样由该步处理。
name: build

on:
  workflow_dispatch: {}        # 手动触发(测试用)
  push:
    tags:
      - 'v*'                    # 打 v* tag 时出包

permissions:
  contents: write        # tag 触发时由 electron-builder 创建草稿 Release 并上传产物;需要写权限

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dist:
    name: dist-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # —— 当前只构建 Windows x64 ——
          - os: windows-latest
            platform: win
            arch: x64
          # —— 预留:解开注释即可把对应平台加入矩阵(刻意默认不构建)——
          # - os: macos-latest
          #   platform: mac
          #   arch: arm64
          # - os: ubuntu-latest
          #   platform: linux
          #   arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14        # 与项目 Phase 3 实测一致

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      # 显式把原生模块按 Electron ABI 在本 runner 重建,并让该步在日志里独立可见。
      # 与 root postinstall 等价且幂等(install-app-deps 命中已构建则快速跳过),用于防 bun 不跑 root 生命周期脚本。
      # 用 npx 让 electron-builder 跑在 node 运行时(bun 装好的本地包),避免 bunx 以 bun 运行时跑重型 node 工具的坑。
      - name: Rebuild native modules for Electron ABI
        run: npx electron-builder install-app-deps

      - name: Build renderer + main (electron-vite)
        run: bun run build:electron

      # 仅 tag(refs/tags/*)触发时发布:--publish always → electron-builder 建「草稿」Release 并上传
      # exe/zip/latest.yml/blockmap;workflow_dispatch 等非 tag 运行 → --publish never,只构建不发布。
      - name: Package (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # electron-builder 读 GH_TOKEN 做 GitHub 发布
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-move-session-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
